apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8up-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: k8up.backup
    interval: 30s
    rules:
    # Критический алерт - ошибки во время бэкапа
    - alert: K8upBackupErrors
      expr: k8up_backup_restic_last_errors > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "K8up backup errors detected ({{ $labels.namespace }}/{{ $labels.pvc }})"
        description: |
          K8up backup job has errors for PVC {{ $labels.pvc }} in namespace {{ $labels.namespace }}.
          **Errors:** {{ $value }}
          **Instance:** {{ $labels.instance }}
          **Job:** {{ $labels.exported_job }}
          **Action:** 🔍 Check backup job logs and restic repository

    # Предупреждение - отсутствие метрик k8up
    - alert: K8upMetricsMissing
      expr: absent(k8up_backup_restic_available_snapshots)
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "K8up metrics are missing"
        description: |
          No K8up backup metrics have been collected for more than 1 hour.
          **Action:** 🔍 Check if K8up jobs are running and promURL is configured correctly

    # Предупреждение - слишком мало снэпшотов
    - alert: K8upLowSnapshotCount
      expr: k8up_backup_restic_available_snapshots < 3
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "K8up low snapshot count ({{ $labels.instance }})"
        description: |
          K8up has less than 3 snapshots available for instance {{ $labels.instance }}.
          **Snapshots:** {{ $value }}
          **Job:** {{ $labels.exported_job }}
          **Action:** ⚠️ Check backup schedule and retention policy

    # Информационный алерт - много измененных файлов во время бэкапа
    - alert: K8upHighFileChanges
      expr: k8up_backup_restic_changed_files_during_backup > 10000
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "K8up high file changes during backup ({{ $labels.namespace }}/{{ $labels.pvc }})"
        description: |
          K8up backup detected high number of changed files during last backup.
          **Changed files:** {{ $value }}
          **PVC:** {{ $labels.pvc }}
          **Namespace:** {{ $labels.namespace }}
          **Action:** ℹ️ This might indicate high data churn

    # Информационный алерт - много новых файлов во время бэкапа
    - alert: K8upHighNewFiles
      expr: k8up_backup_restic_new_files_during_backup > 5000
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "K8up high new files during backup ({{ $labels.namespace }}/{{ $labels.pvc }})"
        description: |
          K8up backup detected high number of new files during last backup.
          **New files:** {{ $value }}
          **PVC:** {{ $labels.pvc }}
          **Namespace:** {{ $labels.namespace }}
          **Action:** ℹ️ Monitor backup size growth

  - name: k8up.backup.health
    interval: 1m
    rules:
    # Критический алерт - бэкап не запускался более 24 часов (по push_time_seconds из Pushgateway)
    # timestamp() нельзя использовать — Prometheus обновляет его при каждом scrape,
    # поэтому timestamp() всегда ~now даже если k8up не запускался.
    - alert: K8upBackupStale
      expr: (time() - push_time_seconds{job="restic_backup"}) > 86400
      for: 1h
      labels:
        severity: critical
      annotations:
        summary: "K8up backup is stale (namespace {{ $labels.instance }})"
        description: |
          No backup activity detected for namespace {{ $labels.instance }} for more than 24 hours.
          Last backup was {{ $value | humanizeDuration }} ago.
          **Action:** 🚨 Check backup schedule and job status

  - name: k8up.operator
    interval: 30s
    rules:
    # Критический алерт - ошибки контроллеров k8up
    - alert: K8upControllerErrors
      expr: increase(controller_runtime_reconcile_errors_total{controller=~".*k8up.*"}[5m]) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "K8up controller errors ({{ $labels.controller }})"
        description: |
          K8up controller {{ $labels.controller }} has reconciliation errors.
          **Errors:** {{ $value }}
          **Controller:** {{ $labels.controller }}
          **Action:** 🔍 Check controller logs and CRD resources

    # Предупреждение - высокий процент неуспешных джоб
    # Учитывает только джобы за последние 2 дня (не исторические данные)
    - alert: K8upHighJobFailureRate
      expr: |
        (
          (
            sum by(jobType, namespace) (increase(k8up_jobs_total{jobType="backup"}[2d]))
            - on(jobType, namespace) sum by(jobType, namespace) (increase(k8up_jobs_successful_counter{jobType="backup"}[2d]))
          ) 
          / on(jobType, namespace) sum by(jobType, namespace) (increase(k8up_jobs_total{jobType="backup"}[2d]))
        ) > 0.1
        and on(jobType, namespace) sum by(jobType, namespace) (increase(k8up_jobs_total{jobType="backup"}[2d])) > 10
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "K8up high job failure rate ({{ $labels.jobType }}/{{ $labels.namespace }})"
        description: |
          K8up has high failure rate for {{ $labels.jobType }} jobs in namespace {{ $labels.namespace }} over the last 2 days.
          **Failure rate:** {{ $value | humanizePercentage }}
          **Total jobs (last 2 days):** {{ $labels.jobType }}
          **Action:** ⚠️ Check job logs and backup configuration

    # Предупреждение - отсутствие метрик оператора
    - alert: K8upOperatorMetricsMissing
      expr: absent(k8up_schedules_gauge)
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "K8up operator metrics are missing"
        description: |
          No K8up operator metrics have been collected for more than 5 minutes.
          **Action:** 🔍 Check if k8up operator is running and ServiceMonitor is configured correctly
