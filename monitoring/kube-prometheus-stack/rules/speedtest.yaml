apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: speedtest-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: speedtest.thresholds
    rules:
    # Пороги по нодам (Mbit/s), единый формат с heathcliff26/speedtest-exporter
    - record: speedtest:threshold:download_mbps
      expr: |
        label_replace(vector(600), "node", "k3s-prod",  "", "")
        or
        label_replace(vector(100), "node", "k3s-yolki", "", "")

    - record: speedtest:threshold:upload_mbps
      expr: |
        label_replace(vector(150), "node", "k3s-prod",  "", "")
        or
        label_replace(vector(20),  "node", "k3s-yolki", "", "")

  - name: speedtest.alerts
    rules:

    # ── Stale: нет метрик или старый timestamp (yolki Pushgateway) ─────────────
    - alert: SpeedtestStale
      expr: |
        (sum by (node) (speedtest:threshold:download_mbps)
          unless sum by (node) (speedtest_download_megabits_per_second))
        or
        (time() - speedtest_last_run_timestamp_seconds > 7200)
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "No speedtest data from {{ $labels.node }}"
        description: "Speedtest data missing or older than 2h on {{ $labels.node }}."

    # ── Download ──────────────────────────────────────────────────────────────
    - alert: SpeedtestDownloadLow
      expr: |
        (speedtest_download_megabits_per_second / on(node) speedtest:threshold:download_mbps < 0.5)
        unless on(node) (speedtest_up == 0)
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Low download on {{ $labels.node }}"
        description: >-
          {{ $labels.node }}: {{ $value | humanizePercentage }} of expected
          ({{ with query (printf "speedtest:threshold:download_mbps{node='%s'}" $labels.node) }}{{ . | first | value }}{{ end }} Mbit/s).

    # ── Upload ────────────────────────────────────────────────────────────────
    - alert: SpeedtestUploadLow
      expr: |
        (speedtest_upload_megabits_per_second / on(node) speedtest:threshold:upload_mbps < 0.5)
        unless on(node) (speedtest_up == 0)
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Low upload on {{ $labels.node }}"
        description: >-
          {{ $labels.node }}: {{ $value | humanizePercentage }} of expected
          ({{ with query (printf "speedtest:threshold:upload_mbps{node='%s'}" $labels.node) }}{{ . | first | value }}{{ end }} Mbit/s).

    # ── Ping / Jitter ─────────────────────────────────────────────────────────
    - alert: SpeedtestHighPing
      expr: speedtest_ping_latency_milliseconds > 80
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "High ping on {{ $labels.node }}"
        description: "{{ $labels.node }}: {{ $value }}ms (threshold: 80ms)."

    - alert: SpeedtestHighJitter
      expr: speedtest_jitter_latency_milliseconds > 20
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "High jitter on {{ $labels.node }}"
        description: "{{ $labels.node }}: {{ $value }}ms (threshold: 20ms)."

    # ── Test failed ───────────────────────────────────────────────────────────
    - alert: SpeedtestFailed
      expr: speedtest_up == 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Speedtest failed on {{ $labels.node }}"
        description: "speedtest_up == 0 on {{ $labels.node }}."
