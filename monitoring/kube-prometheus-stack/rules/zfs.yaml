apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: zfs-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: zfs.recording
    interval: 30s
    rules:

      # ---- ZFS usage percent ----
      - record: zfs_pool_usage_percent
        expr: |
          (
            zfs_pool_allocated_bytes
            /
            zfs_pool_size_bytes
          ) * 100

  - name: zfs-pool-state
    interval: 30s
    rules:
    # Критический алерт: пул не в состоянии ONLINE
    # Охватывает все проблемные состояния: degraded, faulted, unavail, offline, removed, suspended
    - alert: ZFSPoolNotOnline
      expr: node_zfs_zpool_state{state!="online"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "ZFS pool {{ $labels.zpool }} is {{ $labels.state }} on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.zpool }}
          **Status:** {{ $labels.state }}
          **Host:** {{ $labels.hostname }}
          **Action:** ⚠️ Check `zpool status {{ $labels.zpool }}` immediately!
          **Note:** 
          - DEGRADED: Pool functional but redundancy reduced, replace faulted devices
          - FAULTED: Pool completely unavailable, IMMEDIATE ACTION REQUIRED
          - UNAVAIL: Pool cannot be opened, check device connections
          - OFFLINE: Pool was taken offline, check if safe to bring online
          - REMOVED: Pool was removed, check if intentional
          - SUSPENDED: Pool is suspended, check system state

  - name: zfs-capacity
    interval: 30s
    rules:
    # Высокая заполненность пула (>80%) для обычных пулов
    - alert: ZFSPoolCapacityHigh
      expr: |
        zfs_pool_usage_percent{pool!="Unsafe"} > 80
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.pool }} is {{ $value | humanize }}% full on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.pool }}
          **Used:** {{ $value | humanize }}%
          **Allocated:** {{ printf "%.1f" $value }}
          **Host:** {{ $labels.hostname }}
          **Action:** 🗄️ Free up space or expand pool

    # Высокая заполненность пула (>90%) для Unsafe/Media
    - alert: ZFSPoolCapacityHighUnsafeMedia
      expr: |
        zfs_pool_usage_percent{pool="Unsafe"} > 90
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.pool }} (Unsafe/Media) is {{ $value | humanize }}% full on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.pool }}
          **Device:** Unsafe/Media
          **Used:** {{ $value | humanize }}%
          **Allocated:** {{ printf "%.1f" $value }}
          **Host:** {{ $labels.hostname }}
          **Action:** 🗄️ Free up space or expand pool

  - name: zfs-capacity-critical
    interval: 30s
    rules:
    # Критическая заполненность пула (>93%)
    - alert: ZFSPoolCapacityCritical
      expr: |
        zfs_pool_usage_percent > 93
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: "ZFS pool {{ $labels.pool }} is {{ $value | humanize }}% full on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.pool }}
          **Used:** {{ $value | humanize }}%
          **Allocated:** {{ printf "%.1f" $value }}
          **Host:** {{ $labels.hostname }}
          **Action:** 🗄️ Immediate free up space or expand pool

  - name: zfs-performance
    interval: 30s
    rules:
    # Высокая фрагментация пула (>60%)
    - alert: ZFSPoolFragmentationHigh
      expr: |
        zfs_pool_fragmentation_ratio * 100 > 60
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.pool }} fragmentation high on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.pool }}
          **Fragmentation:** {{ $value | humanize }}%
          **Host:** {{ $labels.hostname }}
          **Action:** 💾 Consider pool scrub and balance

    # Проблемы дедупликации (ratio < 1.0)
    - alert: ZFSDeduplicationIssue
      expr: |
        zfs_pool_deduplication_ratio < 1.0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.pool }} dedup ratio abnormal on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.pool }}
          **Deduplication ratio:** {{ $value }}
          **Host:** {{ $labels.hostname }}
          **Issue:** 🧹 Deduplication table may be corrupted

  - name: zfs-health-met
    interval: 30s
    rules:
    # Health метрика от zfs-exporter
    # 0: ONLINE, 1: DEGRADED, 2: FAULTED, 3: OFFLINE, 4: UNAVAIL, 5: REMOVED, 6: SUSPENDED
    - alert: ZFSPoolHealthDegraded
      expr: zfs_pool_health == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "ZFS pool {{ $labels.pool }} is DEGRADED (health=1) on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.pool }}
          **Health:** DEGRADED (value: 1)
          **Host:** {{ $labels.hostname }}
          **Action:** ⚠️ Check `zpool status {{ $labels.pool }}` - one or more devices may be faulted or have errors

    - alert: ZFSPoolHealthFaulted
      expr: zfs_pool_health == 2
      for: 1m
      labels:
        severity: fatal
      annotations:
        summary: "Хранилище повреждено. Пул {{ $labels.pool }} на {{ $labels.hostname }}"
        description: "ZFS пул {{ $labels.pool }} в состоянии FAULTED. Данные могут быть потеряны. Проверьте: zpool status {{ $labels.pool }}"

    - alert: ZFSPoolHealthUnavailable
      expr: zfs_pool_health >= 3
      for: 1m
      labels:
        severity: fatal
      annotations:
        summary: "Хранилище недоступно. Пул {{ $labels.pool }} на {{ $labels.hostname }}"
        description: "ZFS пул {{ $labels.pool }} недоступен (код {{ $value }}: 3=OFFLINE, 4=UNAVAIL, 5=REMOVED, 6=SUSPENDED). Проверьте: zpool status {{ $labels.pool }}"

    - alert: ZFSPoolWillFillSoon
      expr: |
        predict_linear(
          zfs_pool_used_bytes[7d],
          7 * 24 * 3600
        )
        >
        zfs_pool_size_bytes
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.pool }} will be full within 7 days"
        description: |
          Based on last week growth trend,
          pool is predicted to run out of space within 7 days.
