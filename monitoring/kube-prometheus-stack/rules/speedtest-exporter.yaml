apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: speedtest-exporter-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: speedtest-exporter.thresholds
    rules:
    # Пороги по нодам — единственное место, которое меняется при добавлении ноды.
    - record: speedtest:threshold:download_bps
      expr: |
        label_replace(vector(600e6), "node", "k3s-prod",   "", "")
        or
        label_replace(vector(100e6), "node", "k3s-yolki",  "", "")

    - record: speedtest:threshold:upload_bps
      expr: |
        label_replace(vector(150e6), "node", "k3s-prod",   "", "")
        or
        label_replace(vector(20e6),  "node", "k3s-yolki",  "", "")

  - name: speedtest-exporter.alerts
    rules:

    # ── Pod health ────────────────────────────────────────────────────────────
    - alert: SpeedtestExporterPodDown
      expr: |
        kube_daemonset_status_number_ready{daemonset="speedtest-exporter", namespace="monitoring"}
        < kube_daemonset_status_desired_number_scheduled{daemonset="speedtest-exporter", namespace="monitoring"}
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "speedtest-exporter: pod(s) not ready"
        description: >-
          {{ $value }} of {{ with query "kube_daemonset_status_desired_number_scheduled{daemonset='speedtest-exporter',namespace='monitoring'}" }}{{ . | first | value }}{{ end }}
          pods ready. Check DaemonSet.

    # ── Stale: покрывает все ноды из recording rule автоматически ─────────────
    - alert: SpeedtestStale
      expr: |
        sum by (node) (speedtest:threshold:download_bps)
        unless
        sum by (node) (speedtest_download_bits_per_second)
      for: 3h
      labels:
        severity: warning
      annotations:
        summary: "No speedtest data from {{ $labels.node }}"
        description: "speedtest_download_bits_per_second absent for 3h on {{ $labels.node }}."

    # ── Download ──────────────────────────────────────────────────────────────
    - alert: SpeedtestDownloadLow
      expr: |
        speedtest_download_bits_per_second
        / on(node) speedtest:threshold:download_bps < 0.5
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Low download on {{ $labels.node }}"
        description: >-
          {{ $labels.node }}: {{ $value | humanizePercentage }} of expected
          ({{ with query (printf "speedtest:threshold:download_bps{node='%s'}" $labels.node) }}{{ . | first | value | humanize }}{{ end }}bps).

    # ── Upload ────────────────────────────────────────────────────────────────
    - alert: SpeedtestUploadLow
      expr: |
        speedtest_upload_bits_per_second
        / on(node) speedtest:threshold:upload_bps < 0.5
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Low upload on {{ $labels.node }}"
        description: >-
          {{ $labels.node }}: {{ $value | humanizePercentage }} of expected
          ({{ with query (printf "speedtest:threshold:upload_bps{node='%s'}" $labels.node) }}{{ . | first | value | humanize }}{{ end }}bps).

    # ── Ping / Jitter ─────────────────────────────────────────────────────────
    - alert: SpeedtestHighPing
      expr: speedtest_ping_latency_milliseconds > 80
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "High ping on {{ $labels.node }}"
        description: "{{ $labels.node }}: {{ $value }}ms (threshold: 80ms)."

    - alert: SpeedtestHighJitter
      expr: speedtest_ping_jitter_milliseconds > 20
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "High jitter on {{ $labels.node }}"
        description: "{{ $labels.node }}: {{ $value }}ms (threshold: 20ms)."

    # ── Test failed ───────────────────────────────────────────────────────────
    - alert: SpeedtestFailed
      expr: speedtest_up == 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Speedtest failed on {{ $labels.node }}"
        description: "speedtest_up == 0 on {{ $labels.node }}."
