apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bonchbot-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: bonchbot
    interval: 5s
    rules:
    - alert: BonchBotExporterDown
      expr: up{job="bonchbot-exporter"} == 0
      for: 1m
      labels:
        severity: fatal
      annotations:
        summary: "Бонч Бот: метрики недоступны"
        description: "Экспортер Бонч Бота не отвечает уже 1 минуту. Хост: {{ $labels.host }}"

    - alert: BonchBotNotResponding
      expr: |
        bonchbot_last_answer_seconds > 10
      for: 10s
      labels:
        severity: fatal
      annotations:
        summary: "Бонч Бот не отвечает. Среда: {{ $labels.environment }}"
        description: "Последний ответ был {{ $value | humanizeDuration }} назад."

    - alert: BonchBotNotSendingNotifications
      expr: |
        bonchbot_dispatches_seconds_ago > 1m
      for: 10m
      labels:
        severity: fatal
      annotations:
        summary: "Бонч Бот не рассылает уведомления. Среда: {{ $labels.environment }}"
        description: "Последняя рассылка была {{ $value | humanizeDuration }} назад."

    - alert: BonchBotHighLKErrorRate
      expr: |
        bonchbot_lk_errors_last_hour > 1000
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "BonchBot High LK Error rate ({{ $labels.environment }})"
        description: |
          **Errors for last hour:** {{ $value }}

    - alert: BonchBotCriticalLKErrorRate
      expr: |
        bonchbot_lk_errors_last_hour > 2000
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "BonchBot Critical LK Error rate ({{ $labels.environment }})"
        description: |
          **Errors for last hour:** {{ $value }}

    - alert: BonchBotLkSyncAge
      expr: |
        bonchbot_lk_sync_seconds_ago > 10m
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "BonchBot LK Sync stopped ({{ $labels.environment }})"
        description: |
          **Last sync:** {{ $value }} seconds ago

    - alert: BonchBotTimetableAge
      expr: |
        bonchbot_timetable_age_seconds > 24h
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "BonchBot Timetable expired ({{ $labels.environment }})"
        description: |
          **Last successful sync:** {{ $value }}

    - alert: BonchBotArchiving
      expr: |
        bonchbot_archiving_total_seconds == 0
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "BonchBot archiving failed ({{ $labels.environment }})"
        description: |
          **Archiving failed**

    - alert: BonchBotSlowResponse
      expr: |
        bonchbot_timeout_response_ms{environment="production"} > 1000
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "BonchBot slow response ({{ $labels.environment }})"
        description: |
          **Slow response detected: {{ $value }} ms**
