apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartmon-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
  - name: smartmon-health
    interval: 30s
    rules:
    # Критический алерт: диск помечен как нездоровый
    - alert: SmartmonDeviceUnhealthy
      expr: |
        (
          smartmon_device_smart_healthy == 0
        )
        * on(disk) group_left
          smartmon_device_info
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "SMART health FAILED: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Type:** {{ $labels.type }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}N/A{{ end }}
          **Family:** {{ if $labels.model_family }}{{ $labels.model_family }}{{ else }}N/A{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Firmware:** {{ $labels.firmware_version }}
          **Host:** {{ $labels.hostname }}
          **Action:** 🚨 Replace drive immediately!
        
    # Внимание: перераспределенные сектора (критичный показатель)
    - alert: SmartmonReallocatedSectors
      expr: |
        (
          smartmon_reallocated_sector_ct_raw_value > 0
        )
        * on(disk) group_left
          smartmon_device_info
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Reallocated sectors: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Count:** {{ $value }} sectors
          **Host:** {{ $labels.hostname }}
          **Action:** ⚠️ Drive is failing, schedule replacement ASAP!
        
    # Внимание: сектора ожидают перераспределения
    - alert: SmartmonPendingSectors
      expr: |
        (
          smartmon_current_pending_sector_raw_value > 0
        )
        * on(disk) group_left
          smartmon_device_info
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pending sectors: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Pending:** {{ $value }} sectors
          **Host:** {{ $labels.hostname }}
          **Risk:** 🔥 Data loss possible, backup immediately!
        
    # Внимание: неисправимые ошибки
    - alert: SmartmonOfflineUncorrectable
      expr: |
        (
          smartmon_offline_uncorrectable_raw_value > 0
        )
        * on(disk) group_left
          smartmon_device_info
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Uncorrectable errors: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Errors:** {{ $value }} uncorrectable sectors
          **Host:** {{ $labels.hostname }}
          **Action:** 💾 Immediate backup recommended!

    # Внимание: SMART недоступен (диск может быть faulted в ZFS)
    # Это особенно важно для ZFS пулов, где пул может быть ONLINE,
    # но устройство внутри пула может быть faulted (например, INQUIRY failed)
    - alert: SmartmonDeviceUnavailable
      expr: |
        (
          smartmon_device_smart_available == 0
        )
        * on(disk) group_left
          smartmon_device_info
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "SMART unavailable: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.disk }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Type:** {{ $labels.type }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}N/A{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Host:** {{ $labels.hostname }}
          **Issue:** SMART is unavailable (INQUIRY failed or device not responding)
          **Action:** 🚨 Device may be faulted! Check `zpool status` if this device is in a ZFS pool.
          **Note:** Even if ZFS pool shows ONLINE, run `zpool status` to check for faulted devices inside the pool.

  - name: smartmon-performance
    interval: 30s
    rules:
    # Температура для остальных дисков
    - alert: SmartmonHighTemperatureOther
      expr: |
        (
          smartmon_temperature_celsius_raw_value > 55
        )
        * on(disk) group_left
          smartmon_device_info{disk!~".*nvme.*"}
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High temperature: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Temp:** {{ $value }}°C
          **Host:** {{ $labels.hostname }}
          **Threshold:** 55°C
          **Action:** 🌡️ Check cooling/ventilation!
        
    # Ошибки UDMA CRC (проблема с кабелем/контроллером)
    - alert: SmartmonUDMACRCError
      expr: |
        (
          increase(smartmon_udma_crc_error_count_raw_value[1h]) > 0
        )
        * on(disk) group_left
          smartmon_device_info
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "UDMA CRC errors: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Errors:** {{ $value }} in last hour
          **Host:** {{ $labels.hostname }}
          **Issue:** 🔌 Cable or controller problem detected

  - name: smartmon-wear
    interval: 30s
    rules:
    # Для SSD: износ (если есть метрика)
    - alert: SmartmonSSDwearHigh
      expr: |
        (
          smartmon_wear_leveling_count_raw_value > 90
        )
        * on(disk) group_left
          smartmon_device_info
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "SSD wear high: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Wear level:** {{ $value }}%
          **Host:** {{ $labels.hostname }}
          **Action:** 🔄 Consider SSD replacement soon

  - name: smartmon-nvme
    interval: 30s
    rules:
    # Критический износ NAND (порог 80%)
    - alert: NVMeHighPercentageUsed
      expr: |
        (
          smartmon_percentage_used > 80
        )
        * on(disk) group_left
          smartmon_device_info
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "NVMe wear high: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Wear:** {{ $value }}%
          **Host:** {{ $labels.hostname }}
          **Action:** 🔄 Consider SSD replacement soon

    # Критический уровень запасных блоков (<20%)
    - alert: NVMeLowAvailableSpareCritical
      expr: |
        (
          smartmon_available_spare_percentage < 20
        )
        * on(disk) group_left
          smartmon_device_info
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "CRITICAL spare blocks low: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Available spare:** {{ $value }}%
          **Host:** {{ $labels.hostname }}
          **Action:** 🚨 Backup data NOW, drive failure imminent!

    # Предупреждение о запасных блоках (<50%)
    - alert: NVMeLowAvailableSpareWarning
      expr: |
        (
          smartmon_available_spare_percentage < 50
        )
        * on(disk) group_left
          smartmon_device_info
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Low spare blocks: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Available spare:** {{ $value }}%
          **Host:** {{ $labels.hostname }}
          **Action:** ⚠️ Monitor drive closely

    # Всплеск unsafe shutdowns (>5 за день)
    - alert: NVMeHighUnsafeShutdowns
      expr: |
        (
          increase(smartmon_unsafe_shutdown_count_raw_value[1d]) > 5
        )
        * on(disk) group_left
          smartmon_device_info
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Unsafe shutdowns spike: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Recent unsafe shutdowns:** {{ $value }}
          **Host:** {{ $labels.hostname }}
          **Issue:** 💡 Check power supply/UPS

    # Критическая температура (>70°C)
    - alert: NVMeCriticalTemperature
      expr: |
        (
          smartmon_temperature_celsius_raw_value > 70
        )
        * on(disk) group_left
          smartmon_device_info
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "CRITICAL temp: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Temp:** {{ $value }}°C
          **Host:** {{ $labels.hostname }}
          **Action:** 🔥 Throttling imminent, improve cooling!

    # Предупреждение температуры (>65°C)
    - alert: NVMeHighTemperature
      expr: |
        (
          smartmon_temperature_celsius_raw_value > 65
        )
        * on(disk) group_left
          smartmon_device_info
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High temperature: {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}"
        description: |
          **Device:** {{ $labels.disk }}
          **Model:** {{ if $labels.device_model }}{{ $labels.device_model }}{{ else }}{{ $labels.type }}{{ end }}
          **Serial:** {{ $labels.serial_number }}
          **Temp:** {{ $value }}°C
          **Host:** {{ $labels.hostname }}
          **Action:** 🌡️ Monitor cooling

    # Перестал обновляться smart
    - alert: SmartmonStaled
      expr: |
        time() - smartmon_data_collection_timestamp > 20*60
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Smartmon data staled"
        description: |
          Smartmon staled for {{ $value }} seconds

  - name: smartmon-zfs-integration
    interval: 30s
    rules:
    # Внимание: ZFS пул ONLINE, но есть диски с проблемами SMART
    # node_exporter не экспортирует метрики для отдельных vdev,
    # поэтому это правило проверяет наличие проблем через SMART метрики
    # и предупреждает о возможных проблемах в пулах
    - alert: ZFSPoolPossibleDeviceIssues
      expr: |
        (
          node_zfs_zpool_state{state="online"} == 1
        )
        and on(instance, hostname) (
          count by (instance, hostname) (
            smartmon_device_smart_healthy == 0
            or smartmon_reallocated_sector_ct_raw_value > 10
            or smartmon_offline_uncorrectable_raw_value > 0
            or smartmon_current_pending_sector_raw_value > 0
            or smartmon_device_smart_available == 0
          ) > 0
        )
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.zpool }} is ONLINE but disks with SMART issues detected on {{ $labels.hostname }}"
        description: |
          **Pool:** {{ $labels.zpool }}
          **Status:** ONLINE (but may have degraded devices internally)
          **Host:** {{ $labels.hostname }}
          **Issue:** One or more disks on this host have SMART errors or SMART is unavailable (device may be faulted)
          **Action:** ⚠️ Check `zpool status {{ $labels.zpool }}` to verify if any devices are faulted
          **Note:** Even if pool shows ONLINE, run `zpool status` to check for faulted devices inside the pool.
          If devices are faulted, replace them or run `zpool clear` after fixing.

    # Пишем много на nvme
    - alert: NVMeHighTBWIncrease
      expr: |
        increase(nvme_data_units_written_total[24h]) * 512000 / 10^12 > 1.0
      for: 1h
      labels:
        severity: critical
      annotations:
        summary: "High write rate on {{ $labels.device }}"
        description: |
          TBW increase: {{ $value }} per 24h
