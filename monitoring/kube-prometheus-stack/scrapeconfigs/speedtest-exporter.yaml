apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app: speedtest-exporter
  podMetricsEndpoints:
    - port: metrics
      interval: 30m
      scrapeTimeout: 90s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
