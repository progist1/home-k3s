apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-exporter-prod
  namespace: monitoring
  labels:
    app.kubernetes.io/name: speedtest-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-exporter-prod
  template:
    metadata:
      labels:
        app: speedtest-exporter-prod
        app.kubernetes.io/name: speedtest-exporter
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-prod
      containers:
        - name: speedtest-exporter
          image: ghcr.io/heathcliff26/speedtest-exporter:slim
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
