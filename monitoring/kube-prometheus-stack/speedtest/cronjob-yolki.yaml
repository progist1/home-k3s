apiVersion: batch/v1
kind: CronJob
metadata:
  name: speedtest-yolki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: speedtest
spec:
  schedule: "30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: speedtest
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: k3s-yolki
          tolerations:
            - key: node.location.type
              operator: Equal
              value: remote
              effect: NoSchedule
            - key: node.role
              operator: Equal
              value: edge
              effect: NoSchedule
            - key: node.reliability
              operator: Equal
              value: low
              effect: NoSchedule
            - key: node.workload.class
              operator: Equal
              value: cctv
              effect: NoSchedule
          containers:
            - name: speedtest
              image: python:3.14-alpine
              command: ["python3", "/scripts/speedtest.py"]
              env:
                - name: LIBRESPEED_SERVER
                  value: "http://5.35.91.29:19845"
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: scripts
              configMap:
                name: speedtest-script
                defaultMode: 0755
