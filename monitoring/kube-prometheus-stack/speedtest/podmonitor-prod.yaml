apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: speedtest-exporter-prod
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: speedtest-exporter-prod
  namespaceSelector:
    matchNames:
      - monitoring
  podMetricsEndpoints:
    - port: metrics
      interval: 1h
      scrapeTimeout: 120s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
