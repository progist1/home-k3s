apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: speedtest-exporter
spec:
  selector:
    matchLabels:
      app: speedtest-exporter
  template:
    metadata:
      labels:
        app: speedtest-exporter
        app.kubernetes.io/name: speedtest-exporter
    spec:
      nodeSelector:
        monitoring.speedtest/enabled: "true"
      tolerations:
        - key: node.location.type
          operator: Equal
          value: remote
          effect: NoSchedule
        - key: node.role
          operator: Equal
          value: edge
          effect: NoSchedule
        - key: node.reliability
          operator: Equal
          value: low
          effect: NoSchedule
        - key: node.workload.class
          operator: Equal
          value: cctv
          effect: NoSchedule
      containers:
        - name: speedtest-exporter
          image: ghcr.io/miguelndecarvalho/speedtest-exporter:v3.5.4
          ports:
            - name: metrics
              containerPort: 9798
          env:
            - name: SPEEDTEST_PORT
              value: "9798"
          readinessProbe:
            httpGet:
              path: /
              port: 9798
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: 9798
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
