apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: monitoring
  labels:
    app: snmp-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:v0.28.0
          args:
            - --config.file=/etc/snmp_exporter/snmp.yml
          ports:
            - containerPort: 9116
          volumeMounts:
            - name: config
              mountPath: /etc/snmp_exporter
          readinessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: config
          configMap:
            name: snmp-exporter-config
