apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
  namespace: monitoring
data:
  snmp.yml: |
    modules:
      keenetic:
        walk:
          - 1.3.6.1.2.1.2.2        # interfaces table
          - 1.3.6.1.2.1.31.1.1     # ifXTable (ifHCInOctets, ifHCOutOctets, ifHighSpeed)
          - 1.3.6.1.2.1.1.3        # sysUpTime
          - 1.3.6.1.4.1.2021.10    # UCD laTable (load average)
          - 1.3.6.1.4.1.2021.4     # UCD memTable (memory)
          - 1.3.6.1.4.1.2021.11    # UCD systemStats (CPU counters)
        metrics:
          - name: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
            help: Description of the interface
            indexes:
              - labelname: ifIndex
                type: gauge
          - name: ifOperStatus
            oid: 1.3.6.1.2.1.2.2.1.8
            type: gauge
            help: Operational status of the interface (1=up, 2=down)
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
          - name: ifHighSpeed
            oid: 1.3.6.1.2.1.31.1.1.1.15
            type: gauge
            help: Interface speed in Mbps
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
          - name: ifHCInOctets
            oid: 1.3.6.1.2.1.31.1.1.1.6
            type: counter
            help: Inbound octets (high capacity counter)
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
          - name: ifHCOutOctets
            oid: 1.3.6.1.2.1.31.1.1.1.10
            type: counter
            help: Outbound octets (high capacity counter)
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3.0
            type: gauge
            help: System uptime in hundredths of a second

          # Load average (UCD-SNMP laTable)
          - name: laLoadInt
            oid: 1.3.6.1.4.1.2021.10.1.4
            type: gauge
            help: Load average * 100 (1=1min, 2=5min, 3=15min)
            indexes:
              - labelname: laIndex
                type: gauge
            lookups:
              - labels: [laIndex]
                labelname: laNames
                oid: 1.3.6.1.4.1.2021.10.1.2
                type: DisplayString

          # Memory (UCD-SNMP memTable)
          - name: memTotalReal
            oid: 1.3.6.1.4.1.2021.4.5.0
            type: gauge
            help: Total RAM in kB
          - name: memAvailReal
            oid: 1.3.6.1.4.1.2021.4.6.0
            type: gauge
            help: Available RAM in kB
          - name: memBuffer
            oid: 1.3.6.1.4.1.2021.4.14.0
            type: gauge
            help: Buffer memory in kB
          - name: memCached
            oid: 1.3.6.1.4.1.2021.4.15.0
            type: gauge
            help: Cached memory in kB

          # CPU raw counters (UCD-SNMP systemStats)
          - name: ssCpuRawUser
            oid: 1.3.6.1.4.1.2021.11.50.0
            type: counter
            help: CPU ticks in user mode
          - name: ssCpuRawSystem
            oid: 1.3.6.1.4.1.2021.11.52.0
            type: counter
            help: CPU ticks in system mode
          - name: ssCpuRawIdle
            oid: 1.3.6.1.4.1.2021.11.53.0
            type: counter
            help: CPU ticks idle

        version: 2
        auth:
          community: public
