apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
data:
  config.yaml: |
    web:
      port: 8080

    storage:
      type: sqlite
      path: /data/gatus.db

    alerting:
      telegram:
        token: "${TELEGRAM_TOKEN}"
        id: "${TELEGRAM_CHAT_ID}"
        default-alert:
          enabled: true
          failure-threshold: 2
          success-threshold: 2

    defaults: &defaults
      client:
        insecure: true
      interval: 1m
      conditions:
        - "[STATUS] == 200"
      alerts:
        - type: telegram

    tcp: &tcp
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
      alerts:
        - type: telegram

    endpoints:

      # ── Uptime Kuma ────────────────────────────────────────────────────────
      # Основная цель Gatus: алертить когда UK недоступна

      - name: Uptime Kuma
        group: Uptime Kuma
        url: https://kuma.home
        <<: *defaults

      - name: Uptime Kuma (external)
        group: Uptime Kuma
        url: https://status.progist.ru
        <<: *defaults

      # ── Databases ──────────────────────────────────────────────────────────
      # Если БД упала — UK тоже умерла, только Gatus напишет

      - name: MySQL
        group: Databases
        url: tcp://mysql.apps.svc.cluster.local:3306
        <<: *tcp

      - name: PostgreSQL
        group: Databases
        url: tcp://postgres.apps.svc.cluster.local:5432
        <<: *tcp

      - name: PostgreSQL (pgvecto)
        group: Databases
        url: tcp://pgvecto.apps.svc.cluster.local:5432
        <<: *tcp

      - name: Redis
        group: Databases
        url: tcp://redis.apps.svc.cluster.local:6379
        <<: *tcp

      # ── Infrastructure ─────────────────────────────────────────────────────
      # Без NFS и DNS всё падает, UK включая

      - name: Blocky
        group: Infrastructure
        url: https://dns.home/
        <<: *defaults

      - name: TrueNAS
        group: Infrastructure
        url: https://bigb.home
        <<: *defaults

      - name: TrueNAS SSH
        group: Infrastructure
        url: tcp://bigb.home:22
        <<: *tcp

      - name: TrueNAS NFS
        group: Infrastructure
        url: tcp://bigb.home:2049
        <<: *tcp

      # ── Monitoring stack ───────────────────────────────────────────────────
      # Если Alertmanager мёртв — Gatus единственный кто напишет в Telegram

      - name: Prometheus
        group: Monitoring
        url: http://prometheus-operated.monitoring.svc.cluster.local:9090/-/healthy
        interval: 1m
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: telegram

      - name: Alertmanager
        group: Monitoring
        url: https://alerts.home/-/healthy
        <<: *defaults

      - name: Loki
        group: Monitoring
        url: http://loki.monitoring.svc.cluster.local:3100/ready
        interval: 1m
        conditions:
          - "[STATUS] == 200"
          - "[BODY] == ready"
        alerts:
          - type: telegram

      # ── VMs & Hosts ────────────────────────────────────────────────────────
      # Здоровье кластера

      - name: k3s-prod
        group: VMs & Hosts
        url: tcp://k3s.home:22
        <<: *tcp

      - name: k3s-gpu
        group: VMs & Hosts
        url: tcp://10.0.0.3:22
        <<: *tcp

      - name: k3s-pi
        group: VMs & Hosts
        url: tcp://10.0.0.5:22
        <<: *tcp

      - name: k3s-yolki
        group: VMs & Hosts
        url: tcp://10.3.0.2:22
        <<: *tcp
