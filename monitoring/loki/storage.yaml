apiVersion: v1
kind: PersistentVolume
metadata:
  name: loki-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-nvme-manual
  mountOptions:
    - nfsvers=4.1
    - hard
    - rsize=65536
    - wsize=65536
  nfs:
    server: 10.0.0.4
    path: /mnt/Fast/k3s-data/monitoring/loki/data
  claimRef:
    namespace: monitoring
    name: storage-loki-0
