apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules-auth
  namespace: monitoring
  labels:
    loki_rule: "1"  # Sidecar ищет ConfigMap с этим label
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: ruler
data:
  # Loki Ruler rules file
  # For single-tenant (auth_enabled: false), Loki uses "fake" tenant
  # Sidecar копирует файлы в /rules, затем они должны быть в /var/loki/rules/fake/
  fake: |
    groups:
      # ============================================
      # Immich OAuth Authentication
      # ============================================
      - name: immich_oauth
        interval: 1m
        rules:
          - alert: ImmichOAuthLoginActivity
            expr: |
              sum(count_over_time({namespace="apps",app_kubernetes_io_name="server"} |~ "POST /api/oauth/(authorize|callback)" |~ "20[01]" [5m])) > 0
            for: 0s
            labels:
              severity: info
              service: immich
              alert_type: auth_success
            annotations:
              summary: "Immich OAuth authentication detected"
              description: "Immich: {{ $value }} OAuth login(s) detected in last 5 minutes"

          - alert: ImmichHighOAuthActivity
            expr: |
              sum(count_over_time({namespace="apps",app_kubernetes_io_name="server"} |~ "POST /api/oauth/" [5m])) > 5
            for: 2m
            labels:
              severity: warning
              service: immich
              alert_type: suspicious_activity
            annotations:
              summary: "Immich: Suspicious OAuth activity detected"
              description: "Immich: {{ $value }} OAuth requests in last 5 minutes (threshold: 5)"

      # ============================================
      # Authentik Authentication Flow
      # ============================================
      - name: authentik_auth
        interval: 1m
        rules:
          - alert: AuthentikAuthenticationActivity
            expr: |
              sum(count_over_time({namespace="apps",app_kubernetes_io_instance="authentik",app_kubernetes_io_name="authentik",app_kubernetes_io_component="server",container="server"} |~ "POST" |~ "flows/executor" [5m])) > 0
            for: 0s
            labels:
              severity: info
              service: authentik
              alert_type: auth_attempts
            annotations:
              summary: "Authentik authentication activity detected"
              description: "Authentik: {{ $value }} authentication flow(s) executed in last 5 minutes"

          - alert: AuthentikSuccessfulLogin
            expr: |
              sum(count_over_time({namespace="apps",app_kubernetes_io_instance="authentik",app_kubernetes_io_name="authentik",app_kubernetes_io_component="server",container="server"} |~ "action.*login" [5m])) > 0
            for: 0s
            labels:
              severity: info
              service: authentik
              alert_type: auth_success
            annotations:
              summary: "Authentik successful login detected"
              description: "Authentik: {{ $value }} successful login(s) detected in last 5 minutes"

          - alert: AuthentikHighAuthenticationActivity
            expr: |
              sum(count_over_time({namespace="apps",app_kubernetes_io_instance="authentik",app_kubernetes_io_name="authentik",app_kubernetes_io_component="server",container="server"} |~ "POST" |~ "flows/executor" [5m])) > 3
            for: 5m
            labels:
              severity: warning
              service: authentik
              alert_type: suspicious_activity
            annotations:
              summary: "Authentik: Suspicious authentication activity detected"
              description: "Authentik: {{ $value }} flow executions in last 5 minutes (threshold: 3)"

      # ============================================
      # TrueNAS Kernel Events (bigb.home)
      # ============================================
      - name: truenas_kernel
        interval: 1m
        rules:
          - alert: KernelSoftLockup
            expr: |
              count_over_time({hostname="bigb.home", job="host-journal"} |~ "(?i)soft lockup" [5m]) > 0
            for: 0s
            labels:
              severity: critical
              host: bigb.home
            annotations:
              summary: "TrueNAS: kernel soft lockup detected"
              description: "bigb.home kernel reported soft lockup in last 5 minutes — reboot may be required"

          - alert: KernelOOMKill
            expr: |
              count_over_time({hostname="bigb.home", job="host-journal"} |~ "Out of memory|oom_kill_process|Killed process" [5m]) > 0
            for: 0s
            labels:
              severity: warning
              host: bigb.home
            annotations:
              summary: "TrueNAS: OOM kill detected"
              description: "bigb.home kernel OOM killer fired in last 5 minutes"

          - alert: KernelHungTask
            expr: |
              count_over_time({hostname="bigb.home", job="host-journal"} |~ "hung_task|INFO: task .* blocked" [5m]) > 0
            for: 0s
            labels:
              severity: warning
              host: bigb.home
            annotations:
              summary: "TrueNAS: kernel hung task detected"
              description: "bigb.home has a hung task (possible I/O or lock stall)"

          - alert: KernelCallTrace
            expr: |
              count_over_time({hostname="bigb.home", job="host-journal"} |~ "Call Trace:" [5m]) > 0
            for: 0s
            labels:
              severity: critical
              host: bigb.home
            annotations:
              summary: "TrueNAS: kernel call trace (crash/BUG)"
              description: "bigb.home kernel produced a call trace — possible kernel BUG or panic"

          - alert: TrueNASZFSPoolError
            expr: |
              count_over_time({hostname="bigb.home", job="host-journal"} |~ "(?i)zfs.*error|pool.*degraded|pool.*faulted|checksum error" [5m]) > 0
            for: 0s
            labels:
              severity: critical
              host: bigb.home
            annotations:
              summary: "TrueNAS: ZFS pool error"
              description: "bigb.home ZFS reported pool error or degraded state"

          - alert: TrueNASSMARTError
            expr: |
              count_over_time({hostname="bigb.home", job="host-journal"} |~ "(?i)smartd.*error|device error|read failure|reallocated sector" [5m]) > 0
            for: 0s
            labels:
              severity: warning
              host: bigb.home
            annotations:
              summary: "TrueNAS: SMART disk error"
              description: "bigb.home smartd reported disk error"

      # ============================================
      # Jellyfin Authentication
      # ============================================
      - name: jellyfin_auth
        interval: 1m
        rules:
          - alert: JellyfinSuccessfulLogin
            expr: |
              sum(count_over_time({namespace="apps",app="jellyfin",container="jellyfin"} |~ "Authentication request" |~ "succeeded" [5m])) > 0
            for: 0s
            labels:
              severity: info
              service: jellyfin
              alert_type: auth_success
            annotations:
              summary: "Jellyfin: Successful authentication detected"
              description: "Jellyfin: {{ $value }} successful login(s) detected in last 5 minutes. Check Loki logs for username details."

          - alert: JellyfinFailedLoginAttempts
            expr: |
              sum(count_over_time({namespace="apps",app="jellyfin",container="jellyfin"} |~ "Authentication request" |~ "denied" [5m])) > 3
            for: 2m
            labels:
              severity: warning
              service: jellyfin
              alert_type: auth_failures
            annotations:
              summary: "Jellyfin: Multiple failed login attempts detected"
              description: "Jellyfin: {{ $value }} failed login attempts in last 5 minutes (threshold: 3). Check Loki logs for username details."

          - alert: JellyfinBruteForceAttack
            expr: |
              sum(count_over_time({namespace="apps",app="jellyfin",container="jellyfin"} |~ "Authentication request" |~ "denied" [5m])) > 10
            for: 5m
            labels:
              severity: critical
              service: jellyfin
              alert_type: brute_force
            annotations:
              summary: "Jellyfin: CRITICAL - Brute force attack detected"
              description: "Jellyfin: {{ $value }} failed login attempts in last 5 minutes (threshold: 10) - possible brute force attack. Check Loki logs for username details."

