apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner-k8s
  namespace: gitlab-runner
spec:
  interval: 30m
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: gitlab-runner
      version: "0.91.0"
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: gitlab-runner-k8s-values
      valuesKey: values.yaml
