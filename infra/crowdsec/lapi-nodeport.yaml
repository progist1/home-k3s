apiVersion: v1
kind: Service
metadata:
  name: crowdsec-lapi-nodeport
  namespace: crowdsec
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
spec:
  type: NodePort
  selector:
    k8s-app: crowdsec
    type: lapi
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 32080
      protocol: TCP
      name: lapi
