apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  interval: 1h
  chart:
    spec:
      chart: crowdsec
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: crowdsec
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  values:
    _collections: &collections >-
      crowdsecurity/traefik
      crowdsecurity/http-cve
      crowdsecurity/http-dos
      crowdsecurity/postfix
      crowdsecurity/dovecot
      crowdsecurity/wordpress
      crowdsecurity/nextcloud
      crowdsecurity/home-assistant
      crowdsecurity/whitelist-good-actors
      crowdsecurity/wireguard
      gauth-fr/immich
      firix/authentik
      Dominic-Wagner/vaultwarden
      andreasbrett/paperless-ngx
      LePresidente/jellyfin
      LePresidente/jellyseerr
      Jgigantino31/mealie
      corvese/apache-guacamole
      MrShippeR/filebrowser
      timokoessler/uptime-kuma

    image:
      tag: "v1.7.8"
    container_runtime: containerd

    lapi:
      nodeSelector:
        kubernetes.io/hostname: k3s-prod
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
      persistentVolume:
        data:
          enabled: true
          storageClassName: nfs-nvme-dynamic
          accessModes:
            - ReadWriteOnce
          size: 1Gi
        config:
          enabled: true
          existingClaim: "crowdsec-config-pvc"
      extraInitContainers:
        - name: hub-setup
          image: crowdsecurity/crowdsec:v1.7.8
          env:
            - name: COLLECTIONS
              value: *collections
          command:
            - sh
            - -c
            - |
              ln -sf /etc/crowdsec_data /etc/crowdsec && \
              cscli hub update && \
              cscli collections install $COLLECTIONS && \
              cscli hub upgrade --force
          volumeMounts:
            - name: crowdsec-config
              mountPath: /etc/crowdsec_data
            - name: crowdsec-db
              mountPath: /var/lib/crowdsec/data
      env:
        - name: BOUNCER_KEY_traefik_bouncer
          valueFrom:
            secretKeyRef:
              name: crowdsec-vars
              key: crowdsec_bouncer_api_key
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-enroll-secret
              key: enroll-key
        - name: ENROLL_INSTANCE_NAME
          value: "k3s-home"
        - name: ENROLL_TAGS
          value: "k8s linux home"

    config:
      console.yaml: |
        share_manual_decisions: true
        share_tainted: true
        share_custom: true
        console_management: true
        share_context: true
      parsers:
        s00-raw: {}
        s01-parse:
          mailu-postfix-program.yaml: |
            name: custom/mailu-postfix-program
            description: "Fix postfix program+message for Mailu container logs (syslog header in CRI)"
            filter: 'evt.Parsed.program == "postfix"'
            nodes:
              - grok:
                  apply_on: message
                  pattern: '%{SYSLOGTIMESTAMP} %{NOTSPACE} postfix/%{WORD:postfix_daemon}\[%{INT}\]: %{GREEDYDATA:message}'
                statics:
                  - parsed: program
                    expression: '"postfix/" + evt.Parsed.postfix_daemon'
          mailu-front-auth.yaml: |
            name: custom/mailu-front-auth
            description: "Parse Mailu nginx SMTP stream and dovecot IMAP auth failures from mailu-front pod"
            filter: 'evt.Parsed.program == "mailu-front"'
            onsuccess: next_stage
            nodes:
              - grok:
                  apply_on: message
                  pattern: '.+client login failed: .+client: %{IP:source_ip},.+:%{NUMBER:smtp_port},'
                statics:
                  - meta: log_type
                    value: smtp_auth_fail
                  - target: evt.StrVal["SourceIp"]
                    expression: evt.Parsed.source_ip
              - grok:
                  apply_on: message
                  pattern: '.+login: .+auth failed.+rip=%{IP:source_ip},'
                statics:
                  - meta: log_type
                    value: imap_auth_fail
                  - target: evt.StrVal["SourceIp"]
                    expression: evt.Parsed.source_ip
        s02-enrich:
          home-whitelist.yaml: |
            name: custom/home-whitelist
            description: "Whitelist static home IP"
            whitelist:
              reason: "Static home IP (progist)"
              ip:
                - "188.134.87.62"
      scenarios:
        mailu-smtp-bf.yaml: |
          type: counter
          name: custom/mailu-smtp-bf
          description: "Brute force on Mailu SMTP (port 25/587 auth probing)"
          filter: "evt.Meta.log_type == 'smtp_auth_fail'"
          groupby:
            expression: evt.StrVal["SourceIp"]
          duration: 10m
          count: 1
          labels:
            service: smtp
            type: brute_force
            remediation: true
          blackhole: 4h
        mailu-imap-bf.yaml: |
          type: leaky
          name: custom/mailu-imap-bf
          description: "Brute force on Mailu IMAP/submission (dovecot auth failed)"
          filter: "evt.Meta.log_type == 'imap_auth_fail'"
          leakspeed: "10s"
          capacity: 5
          groupby:
            expression: evt.StrVal["SourceIp"]
          labels:
            service: imap
            type: brute_force
            remediation: true
          blackhole: 4h

    agent:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "1500m"
          memory: "256Mi"
      tolerations:
        - key: node.hardware.gpu
          value: intel-igpu
          effect: NoSchedule
        - key: node.hardware.arch
          value: arm64
          effect: NoSchedule
      env:
        - name: COLLECTIONS
          value: *collections
      acquisition:
        # ── Ingress (k3s-prod) ──────────────────────────────────────────
        - namespace: kube-system
          podName: traefik-*
          program: traefik
        # ── Mail (k3s-prod) ─────────────────────────────────────────────
        - namespace: apps
          podName: mailu-postfix-*
          program: postfix
        - namespace: apps
          podName: mailu-dovecot-*
          program: dovecot
        - namespace: apps
          podName: mailu-front-*
          program: mailu-front
        # ── Auth & access (k3s-prod) ─────────────────────────────────────
        - namespace: apps
          podName: authentik-server-*
          program: authentik
        # ── Apps on k3s-prod ─────────────────────────────────────────────
        - namespace: apps
          podName: home-assistant-*
          program: home-assistant
        - namespace: apps
          podName: nextcloud-*
          program: nextcloud
        - namespace: apps
          podName: vaultwarden-*
          program: vaultwarden
        - namespace: apps
          podName: paperless-*
          program: paperless-ngx
        - namespace: apps
          podName: mealie-*
          program: mealie
        - namespace: apps
          podName: filebrowser-*
          program: filebrowser
        - namespace: apps
          podName: guacamole-*
          program: apache-guacamole
        # ── Media (k3s-gpu — agent covers once toleration applied) ────────
        - namespace: apps
          podName: immich-server-*
          program: immich
        - namespace: apps
          podName: jellyfin-*
          program: jellyfin
        - namespace: apps
          podName: seerr-*
          program: jellyseerr
        # ── Monitoring (k3s-prod) ─────────────────────────────────────────
        - namespace: monitoring
          podName: uptime-kuma-*
          program: uptime-kuma
        # ── Apps on k3s-pi ───────────────────────────────────────────────
        - namespace: apps
          podName: memos-*
          program: memos
        - namespace: apps
          podName: vikunja-*
          program: vikunja
        - namespace: apps
          podName: wizarr-*
          program: wizarr
        # ── Apps without node pinning ─────────────────────────────────────
        - namespace: apps
          podName: actual-budget-*
          program: actual-budget
