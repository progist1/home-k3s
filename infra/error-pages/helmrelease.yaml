apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: error-pages
  namespace: infra
spec:
  interval: 1h
  chart:
    spec:
      chart: error-pages
      version: "4.2.3"
      sourceRef:
        kind: HelmRepository
        name: error-pages
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      htmlTemplate:
        name: lost-in-space
      sendSameHttpCode: true
      showDetails: true
      addLink:
        - label: "Статус сервисов"
          url: "https://status.progist.ru"

    traefikMiddleware:
      enabled: true
      # Wildcard catch-all routes only (infra-error-pages@kubernetescrd). Apps: infra-error-pages-optin@kubernetescrd
      statusCodes: ["402", "404-408", "410-599"]

    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"
