apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: backup-gitlab-daily
  namespace: gitlab
spec:
  backend:
    s3:
      endpoint: http://minio.infra.svc.cluster.local:9000
      bucket: k8up-backups
      accessKeyIDSecretRef:
        name: k8up-secrets
        key: access-key
      secretAccessKeySecretRef:
        name: k8up-secrets
        key: secret-key
    repoPasswordSecretRef:
      name: k8up-secrets
      key: password

  backup:
    schedule: "30 6 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 0
    promURL: "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091"
    tags:
      - "minio"
      - "gitlab"
    labelSelectors:
      - matchExpressions:
        - key: backup-level
          operator: In
          values:
            - important
            - daily
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  prune:
    schedule: "0 8 * * *"
    retention:
      keepLast: 12
      keepDaily: 7
      keepWeekly: 4
      keepMonthly: 1
---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: backup-gitlab-offsite
  namespace: gitlab
spec:
  backend:
    b2:
      bucket: progist-k8up
      accountIDSecretRef:
        name: k8up-backblaze-secrets
        key: access-key
      accountKeySecretRef:
        name: k8up-backblaze-secrets
        key: secret-key
    repoPasswordSecretRef:
      name: k8up-backblaze-secrets
      key: password

  backup:
    schedule: "0 7 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 0
    promURL: "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091"
    tags:
      - "backblaze"
      - "offsite"
      - "gitlab"
    labelSelectors:
      - matchExpressions:
        - key: backup-level
          operator: In
          values:
            - important
            - daily
      - matchExpressions:
        - key: backup-offsite
          operator: In
          values:
            - "true"
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  prune:
    schedule: "0 9 * * *"
    retention:
      keepLast: 12
      keepDaily: 7
      keepWeekly: 4
      keepMonthly: 1
