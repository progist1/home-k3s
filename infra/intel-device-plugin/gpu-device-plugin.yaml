apiVersion: deviceplugin.intel.com/v1
kind: GpuDevicePlugin
metadata:
  name: gpu-device-plugin
  namespace: kube-system
spec:
  # Настройка для разделения одного GPU между несколькими подами
  # shared-dev-num: количество подов, которые могут использовать один GPU одновременно
  # Для media transcode (Jellyfin, Immich) это подходит - они не критичны по времени
  sharedDevNum: 8  # Позволяет Jellyfin и Immich использовать один GPU одновременно
  tolerations:
    - key: "node.hardware.gpu"
      operator: "Equal"
      value: "intel-igpu"
      effect: "NoSchedule"
    - key: "node.location.type"
      operator: "Equal"
      value: "remote"
      effect: "NoSchedule"
    - key: "node.role"
      operator: "Equal"
      value: "edge"
      effect: "NoSchedule"
    - key: "node.reliability"
      operator: "Equal"
      value: "low"
      effect: "NoSchedule"
    - key: "node.workload.class"
      operator: "Equal"
      value: "cctv"
      effect: "NoSchedule"
