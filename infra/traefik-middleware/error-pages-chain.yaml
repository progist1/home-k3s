# Opt-in: pretty 5xx for apps that need custom error pages on backend failures.
# Usage: traefik.ingress.kubernetes.io/router.middlewares: infra-error-pages-chain@kubernetescrd
# Or only errors middleware (no redirect): infra-error-pages-optin@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: error-pages-chain
  namespace: infra
spec:
  chain:
    middlewares:
      - name: redirect-to-https
        namespace: infra
      - name: error-pages-optin
        namespace: infra
