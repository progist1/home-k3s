# traefik-config.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |
    service:
      spec:
        externalTrafficPolicy: Local

    experimental:
      plugins:
        crowdsec-bouncer-traefik-plugin:
          moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
          version: "v1.6.0"

    logs:
      access:
        enabled: true
        format: json
        fields:
          general:
            defaultmode: keep
          headers:
            defaultmode: drop
            names:
              User-Agent: keep
              X-Forwarded-For: keep
              X-Real-Ip: keep

    volumes:
      - name: crowdsec-ban-page
        mountPath: "/ban"
        type: configMap

    additionalArguments:
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0s"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=0s"
      - "--entrypoints.metrics.address=:9100"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--entrypoints.ssh.address=:22/tcp"
      - "--entrypoints.websecure.http.middlewares=crowdsec-crowdsec-bouncer@kubernetescrd,infra-error-pages@kubernetescrd"
