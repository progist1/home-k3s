apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mailu-postfix
    app-group: mailu
    app.kubernetes.io/part-of: mailu
    app.kubernetes.io/name: mailu-postfix
  annotations:
    kustomize.toolkit.fluxcd.io/force: "enabled"
  name: mailu-postfix
  namespace: apps
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mailu-postfix
  template:
    metadata:
      labels:
        app: mailu-postfix
        app.kubernetes.io/name: mailu-postfix
        app.kubernetes.io/part-of: mailu
    spec:
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 2
      containers:
      - image: ghcr.io/mailu/postfix:2024.06.48
        env:
        - name: LOG_LEVEL
          value: WARNING
        envFrom:
        - configMapRef:
            name: mailu-envvars
        imagePullPolicy: IfNotPresent
        name: postfix
        ports:
        - containerPort: 25
          name: smtp
          protocol: TCP
        - containerPort: 465
          name: smtp-ssl
          protocol: TCP
        - containerPort: 587
          name: smtp-starttls
          protocol: TCP
        - containerPort: 10025
          name: smtp-auth
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 10025
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 3
        livenessProbe:
          tcpSocket:
            port: 10025
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 3
        startupProbe:
          tcpSocket:
            port: 10025
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: "500m"
            memory: 128Mi
          requests:
            cpu: 25m
            memory: 64Mi
        volumeMounts:
        - mountPath: /queue
          name: data
      volumes:
      - name: data
        emptyDir: {}
