apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: apps
  labels:
    app.kubernetes.io/name: tika
    app.kubernetes.io/part-of: paperless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
        app.kubernetes.io/name: tika
        app.kubernetes.io/part-of: paperless
    spec:
      containers:
        - name: tika
          image: apache/tika:3.3.0.0-full
          ports:
            - containerPort: 9998
          livenessProbe:
            httpGet:
              path: /tika
              port: 9998
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /tika
              port: 9998
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
