apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: apps
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: home-cluster
    managed-by: flux
    environment: production
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
        app.kubernetes.io/part-of: home-cluster
        environment: production
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-yolki
        node.role: edge
      tolerations:
        - key: node.location.type
          operator: Equal
          value: remote
          effect: NoSchedule
        - key: node.role
          operator: Equal
          value: edge
          effect: NoSchedule
        - key: node.workload.class
          operator: Equal
          value: cctv
          effect: NoSchedule
        - key: node.reliability
          operator: Equal
          value: low
          effect: NoSchedule
      containers:
        - name: ollama
          image: ollama/ollama:0.30.11
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: TZ
              value: Europe/Moscow
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            - name: OLLAMA_MODELS
              value: "/root/.ollama/models"
            - name: OLLAMA_NO_CLOUD
              value: "1"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "10Gi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
