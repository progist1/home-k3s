apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pvc-archiver-shelfarr
  namespace: apps
spec:
  interval: 10m
  chart:
    spec:
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      chart: charts/pvc-archiver
  values:
    name: shelfarr
    archiveName: shelfarr
    sourcePVC: shelfarr-data-pvc
    destPVC: backups-pvc
    schedule: "30 5 * * *"
    securityContext:
      fsGroup: 0
      supplementalGroups: [0]
