apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelfarr
  namespace: apps
  labels:
    app.kubernetes.io/name: shelfarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shelfarr
  template:
    metadata:
      labels:
        app: shelfarr
        app.kubernetes.io/name: shelfarr
    spec:
      containers:
        - name: shelfarr
          image: ghcr.io/pedro-revez-silva/shelfarr:latest
          ports:
            - containerPort: 80
          env:
            - name: SOLID_QUEUE_IN_PUMA
              value: "1"
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: TZ
              value: "Europe/Moscow"
          volumeMounts:
            - name: data
              mountPath: /rails/storage
            - name: audiobooks
              mountPath: /audiobooks
            - name: ebooks
              mountPath: /ebooks
            - name: downloads
              mountPath: /downloads
          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shelfarr-data-pvc
        - name: audiobooks
          persistentVolumeClaim:
            claimName: audiobookshelf-audiobooks-pvc
        - name: ebooks
          persistentVolumeClaim:
            claimName: shelfarr-ebooks-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: transmission-download-pvc
