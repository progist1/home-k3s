apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgvecto
  namespace: apps
  labels:
    app.kubernetes.io/name: pgvecto
    app.kubernetes.io/part-of: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pgvecto
  template:
    metadata:
      labels:
        app: pgvecto
        app.kubernetes.io/name: pgvecto
        app.kubernetes.io/part-of: immich
      annotations:
        k8up.io/backupcommand: 'sh -c ''PGPASSWORD="$POSTGRES_PASSWORD" pg_dumpall -U "$POSTGRES_USER"'''
        k8up.io/file-extension: .sql
    spec:
      nodeSelector:
        node.storage.mount.immich-pgvecto: "true"
      containers:
        - name: pgvecto
          image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3
          ports:
            - containerPort: 5432
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: DB_DATABASE_NAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: immich-secrets
                  key: DB_USERNAME
            - name: TZ
              value: "Europe/Moscow"
            - name: PGPORT
              value: "5432"
            - name: POSTGRES_SHARED_BUFFERS
              value: "512MB"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/18/docker
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: immich-pgvecto-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
