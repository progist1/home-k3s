apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-immich-postgres
  namespace: apps
spec:
  schedule: "30 5 * * *"
  timeZone: "Europe/Moscow"
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pgdump
              image: busybox:1.37
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TODAY=$(date +%Y%m%d)
                  FILE=$(ls /immich-backups/immich-db-backup-${TODAY}T*.sql.gz 2>/dev/null | head -1)
                  if [ -z "$FILE" ]; then
                    echo "[!] No Immich DB backup found for today (${TODAY}). Immich backup job may have failed."
                    exit 1
                  fi
                  TS=$(date +%Y_%m_%d_%H_%M_%S)
                  DEST="/backups/immich-postgres_${TS}.sql.gz"
                  echo "[*] Copying $FILE → $DEST"
                  cp "$FILE" "$DEST"
                  echo "[*] Done."
              volumeMounts:
                - name: immich-backups
                  mountPath: /immich-backups
                  readOnly: true
                - name: backup
                  mountPath: /backups
              resources:
                requests:
                  cpu: "50m"
                  memory: "32Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
          volumes:
            - name: immich-backups
              persistentVolumeClaim:
                claimName: immich-hdd-backups-pvc
                readOnly: true
            - name: backup
              persistentVolumeClaim:
                claimName: backups-pvc
