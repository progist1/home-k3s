env:
  - name: IMMICH_LOG_LEVEL
    value: 'debug'
  - name: REDIS_HOSTNAME
    value: 'redis.apps.svc.cluster.local'
  - name: TRANSFORMERS_CACHE
    value: '/cache'
  - name: REDIS_DBINDEX
    value: "5"
  - name: REDIS_PORT
    value: "6379"
  - name: IMMICH_PORT
    value: "2283"
  - name: DB_HOSTNAME
    value: "pgvecto.apps.svc.cluster.local"
  - name: DB_PORT
    value: "5432"
  - name: IMMICH_MACHINE_LEARNING_URL
    value: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
  - name: DB_DATABASE_NAME
    valueFrom:
      secretKeyRef:
        name: immich-secrets
        key: DB_DATABASE_NAME
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: immich-secrets
        key: DB_PASSWORD
  - name: DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: immich-secrets
        key: DB_USERNAME

immich:
  metrics:
    enabled: false
  persistence:
    library:
      existingClaim: immich-pvc

server:
  enabled: true
  strategy:
    type: Recreate
  image:
    repository: ghcr.io/immich-app/immich-server
    tag: v2.6.3
    pullPolicy: IfNotPresent
  envFrom:
    - secretRef:
        name: immich-secrets
  persistence:
    backups:
      enabled: true
      existingClaim: immich-hdd-backups-pvc
      mountPath: /usr/src/app/upload/backups
    encoded-video:
      enabled: true
      existingClaim: immich-hdd-videos-pvc
      mountPath: /usr/src/app/upload/encoded-video
    profile:
      enabled: true
      existingClaim: immich-profile-pvc
      mountPath: /usr/src/app/upload/profile
    thumbs:
      enabled: true
      existingClaim: immich-thumbs-pvc
      mountPath: /usr/src/app/upload/thumbs
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
      gpu.intel.com/i915: "1"
    limits:
      cpu: "8000m"
      memory: "12Gi"
      gpu.intel.com/i915: "1"
  nodeSelector:
    node.hardware.gpu: intel-igpu
  tolerations:
    - key: node.hardware.gpu
      operator: Equal
      value: intel-igpu
      effect: NoSchedule
machine-learning:
  enabled: true
  nodeSelector:
    node.hardware.gpu: intel-igpu
  tolerations:
    - key: node.hardware.gpu
      operator: Equal
      value: intel-igpu
      effect: NoSchedule
  image:
    repository: ghcr.io/immich-app/immich-machine-learning
    tag: v2.6.3-openvino
    pullPolicy: IfNotPresent
  persistence:
    cache:
      enabled: true
      existingClaim: immich-fast-ml-pvc
      mountPath: "/cache"
      type: pvc
  envFrom:
    - secretRef:
        name: immich-secrets
  env:
    IMMICH_PORT: "3003"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
      gpu.intel.com/i915: "1"
    limits:
      cpu: "2000m"
      memory: "20Gi"
      gpu.intel.com/i915: "1"
