apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pvc-archiver-audiobookshelf
  namespace: apps
spec:
  interval: 10m
  chart:
    spec:
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      chart: charts/pvc-archiver
  values:
    name: audiobookshelf
    archiveName: audiobookshelf
    sourcePVC: audiobookshelf-config-pvc
    destPVC: backups-pvc
    schedule: "50 5 * * *"
    exclude: "**/cache/**;**/.cache/**"
    securityContext:
      fsGroup: 0
      supplementalGroups: [0]
