apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-tracker
  namespace: apps
  labels:
    app.kubernetes.io/name: speedtest-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-tracker
  template:
    metadata:
      labels:
        app: speedtest-tracker
        app.kubernetes.io/name: speedtest-tracker
    spec:
      containers:
        - name: speedtest-tracker
          image: lscr.io/linuxserver/speedtest-tracker:1.13.10
          ports:
            - containerPort: 80
          env:
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: TZ
              value: "Europe/Moscow"
            - name: APP_URL
              value: "https://speedtest.home"
            - name: DB_CONNECTION
              value: "pgsql"
            - name: DB_HOST
              value: "postgres.apps.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "speedtest_tracker"
            - name: DB_USERNAME
              value: "speedtest_tracker"
            - name: SPEEDTEST_SCHEDULE
              value: "0 * * * *"
            - name: PRUNE_RESULTS_OLDER_THAN
              value: "365"
            - name: DISPLAY_TIMEZONE
              value: "Europe/Moscow"
          envFrom:
            - secretRef:
                name: speedtest-tracker-secrets
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: config
          emptyDir: {}
