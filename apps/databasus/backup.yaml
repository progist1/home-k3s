apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pvc-archiver-databasus
  namespace: apps
spec:
  interval: 10m
  chart:
    spec:
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      chart: charts/pvc-archiver
  values:
    name: databasus
    archiveName: databasus
    sourcePVC: databasus-data-pvc
    destPVC: backups-pvc
    schedule: "20 5 * * *"
    securityContext:
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
