apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: apps
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        app.kubernetes.io/name: n8n
    spec:
      serviceAccountName: n8n-k8s
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: install-kubectl
          image: bitnami/kubectl:latest@sha256:e21d3b5ca1f600677376b5468416e6d025a1380aaec77f981345cccec5916066
          command:
            - /bin/cp
            - /opt/bitnami/kubectl/bin/kubectl
            - /tools/kubectl
          volumeMounts:
            - name: tools
              mountPath: /tools
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: n8n
          image: n8nio/n8n:2.31.0
          ports:
            - containerPort: 5678
          env:
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            # Enable Execute Command node; keep LocalFileTrigger disabled (security).
            - name: NODES_EXCLUDE
              value: "[n8n-nodes-base.localFileTrigger]"
            - name: N8N_HOST
              value: "n8n.home"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.home"
            - name: WEBHOOK_URL
              value: "https://n8n.home"
            - name: GENERIC_TIMEZONE
              value: "Europe/Moscow"
            - name: TZ
              value: "Europe/Moscow"
            - name: DB_TYPE
              value: "sqlite"
            - name: N8N_USER_FOLDER
              value: "/home/node/.n8n"
          volumeMounts:
            - name: config
              mountPath: /home/node/.n8n
            - name: tools
              mountPath: /tools
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: tools
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: n8n-config-pvc
