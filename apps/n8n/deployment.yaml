apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: apps
  labels:
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        app.kubernetes.io/name: n8n
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: n8n
          image: n8nio/n8n:2.11.1
          ports:
            - containerPort: 5678
          env:
            - name: N8N_HOST
              value: "n8n.home"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.home"
            - name: WEBHOOK_URL
              value: "https://n8n.home"
            - name: GENERIC_TIMEZONE
              value: "Europe/Moscow"
            - name: TZ
              value: "Europe/Moscow"
            - name: DB_TYPE
              value: "sqlite"
            - name: N8N_USER_FOLDER
              value: "/home/node/.n8n"
          volumeMounts:
            - name: config
              mountPath: /home/node/.n8n
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: n8n-config-pvc
