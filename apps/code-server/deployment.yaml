apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: apps
  labels:
    app.kubernetes.io/name: code-server
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
        app.kubernetes.io/name: code-server
        managed-by: flux
        app.kubernetes.io/part-of: home-cluster
        environment: production
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: code-server
          image: codercom/code-server:4.127.0
          imagePullPolicy: IfNotPresent
          args:
            - --bind-addr
            - "0.0.0.0:8080"
            - --auth
            - password
            - --disable-telemetry
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: code-server-secrets
                  key: PASSWORD
            - name: TZ
              value: Europe/Moscow
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /home/coder
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-data-pvc
