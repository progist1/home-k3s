apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pvc-archiver-code-server
  namespace: apps
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
spec:
  interval: 10m
  chart:
    spec:
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      chart: charts/pvc-archiver
  values:
    name: code-server
    archiveName: code-server
    sourcePVC: code-server-data-pvc
    destPVC: backups-pvc
    schedule: "15 5 * * *"
    exclude: "**/cache/**;**/.cache/**;**/tmp/**;**/CachedData/**"
    securityContext:
      fsGroup: 1000
      supplementalGroups: [1000]
