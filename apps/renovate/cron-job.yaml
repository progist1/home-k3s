apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 */6 * * *"
  timeZone: "Europe/Moscow"
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: renovate
        spec:
          restartPolicy: OnFailure
          containers:
            - name: renovate
              image: renovate/renovate:43.257.7
              env:
                - name: LOG_LEVEL
                  value: info
                - name: NODE_EXTRA_CA_CERTS
                  value: "/usr/local/share/ca-certificates/ca.crt"
                - name: GIT_SSL_CAINFO
                  value: "/usr/local/share/ca-certificates/ca.crt"
                - name: RENOVATE_PLATFORM
                  value: gitlab
                - name: RENOVATE_ENDPOINT
                  value: https://gitlab.home/api/v4
                - name: RENOVATE_AUTODISCOVER
                  value: "true"
                - name: RENOVATE_DETECT_HOST_RULES_FROM_ENV
                  value: "true"
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-token
                      key: RENOVATE_TOKEN
                - name: RENOVATE_GITHUB_COM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-github-token
                      key: RENOVATE_GITHUB_COM_TOKEN
                - name: RENOVATE_DOCKER_DOCKER_IO_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: renovate-docker-hub
                      key: DOCKER_USERNAME
                - name: RENOVATE_DOCKER_DOCKER_IO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: renovate-docker-hub
                      key: DOCKER_PASSWORD

              volumeMounts:
                - name: home-root-ca
                  mountPath: /usr/local/share/ca-certificates/ca.crt
                  subPath: ca.crt

              resources:
                requests:
                  cpu: "100m"
                  memory: "512Mi"
                limits:
                  cpu: "1000m"
                  memory: "2Gi"
          volumes:
            - name: home-root-ca
              configMap:
                name: home-root-ca
      ttlSecondsAfterFinished: 5
