apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-mysql
  namespace: apps
spec:
  schedule: "0 4 * * *"
  timeZone: "Europe/Moscow"
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: mysqldump
              image: mysql:8.4.8
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TS=$(date +%Y_%m_%d_%H_%M_%S)
                  HOST=mysql.apps.svc.cluster.local
                  WORKDIR=$(mktemp -d -p /backups)

                  DATABASES=$(mysql --host=$HOST --user=root --batch --skip-column-names \
                    -e "SHOW DATABASES;" | grep -Ev "^(information_schema|performance_schema|sys|mysql)$")

                  for DB in $DATABASES; do
                    echo "[*] Dumping $DB → $WORKDIR/${DB}.sql"
                    mysqldump --host=$HOST \
                              --user=root \
                              --single-transaction \
                              --quick \
                              "$DB" > "$WORKDIR/${DB}.sql"
                  done

                  FILE="/backups/mysql_${TS}.tar.gz"
                  echo "[*] Archiving → $FILE"
                  tar -czf "$FILE" -C "$WORKDIR" .
                  rm -rf "$WORKDIR"
              env:
                - name: MYSQL_PWD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secrets
                      key: root-password
              volumeMounts:
                - name: backup
                  mountPath: /backups
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: backups-pvc
