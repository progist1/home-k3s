apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pvc-archiver-open-webui
  namespace: apps
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
spec:
  interval: 10m
  chart:
    spec:
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      chart: charts/pvc-archiver
  values:
    name: open-webui
    archiveName: open-webui
    sourcePVC: open-webui-data-pvc
    destPVC: backups-pvc
    schedule: "20 5 * * *"
    exclude: "**/cache/**;**/.cache/**;**/tmp/**"
