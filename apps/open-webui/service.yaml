apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: apps
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: home-cluster
    managed-by: flux
    environment: production
spec:
  selector:
    app: open-webui
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
