apiVersion: v1
kind: PersistentVolume
metadata:
  name: open-webui-data-pv
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
spec:
  storageClassName: nfs-nvme-manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /mnt/Fast/k3s-data/open-webui/data
    server: 10.0.0.4
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data-pvc
  namespace: apps
  annotations:
    k8up.io/backup: "true"
  labels:
    managed-by: flux
    app.kubernetes.io/part-of: home-cluster
    environment: production
    backup-level: important
    backup-offsite: "true"
spec:
  storageClassName: nfs-nvme-manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  volumeName: open-webui-data-pv
