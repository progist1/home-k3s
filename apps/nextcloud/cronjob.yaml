apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
  namespace: apps
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: k3s-prod
          containers:
            - name: nextcloud-cron
              image: curlimages/curl:8.21.0
              command:
                - sh
                - -c
                - 'curl -f -s -H "Host: cloud.progist.ru" http://nextcloud.apps.svc.cluster.local/cron.php || exit 1'
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"
          restartPolicy: OnFailure
