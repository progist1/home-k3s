apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        hosts /etc/coredns/CustomHosts {
            fallthrough
        }
        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf
        cache 30
        loop
        reload
        loadbalance
    }
    import /etc/coredns/custom/*.server
  NodeHosts: |
    10.0.0.3 k3s-gpu
    10.0.0.5 k3s-pi
    10.0.0.2 k3s-prod
    10.3.0.2 k3s-yolki
  CustomHosts: |
    10.0.0.4 bigb.home
    10.3.0.2 vps.yolki
    10.8.0.2 vps.spb
    10.8.0.3 vps.amsterdam
