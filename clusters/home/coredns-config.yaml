apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coredns-config
  namespace: flux-system
spec:
  interval: 5m
  # force: true enables --force-conflicts on server-side apply.
  # This ensures Flux wins field ownership over k3s's addon controller,
  # which resets replicas to 1 and removes tolerations on k3s restart.
  force: true
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./cluster-addons
  prune: true
